<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coblog - Tudo sobre a Copa!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="../css/style.css" rel="stylesheet">
</head>


<body>
    <!-- Links para ajudar na importação dos arquivos
        https://pt.stackoverflow.com/questions/12722/incluir-outro-arquivo-html-em-um-arquivo-html
        https://web.dev/articles/imports?hl=pt-br
    -->

    <input type="checkbox" id="lua" hidden>
    <label for="lua" class="dark-mode-btn">🌙</label>

    <header class="header col-12">
        <h2>Coblog</h2>
        <nav id="nav" style="gap: 15px; padding-right: 10px;" class="d-flex justify-content-between">
            <a href="../index.html" class="nav-link text-white"><span class="menu-texto">Página
                    Inicial</span></a>
        </nav>
    </header>
    
    <sidebar id="sidebar">
        <input type="checkbox" id="menu-toggle" hidden>
        <label for="menu-toggle" class="hamburguer" style="color: rgb(0, 102, 255)">☰</label>

        <nav class="menu" style="color: white" ; id="menu-lateral">
            <h4 style="padding-top: 5px;" class="text-white menu-texto">Menu</h4>
            <a href="edicoesAnteriores.html" class="nav-link text-white" target="_parent">Edições
                da Copa</a>
            <a href="comunidade.html" class="nav-link text-white" target="_parent">Comunidade</a>
        </nav>
    </sidebar>
    
    <main style="display: flex; justify-content: center; align-items: center; flex: 1;">
        <div class="card col-6" style="background-color: #3066BE; margin:auto">
            <h5 class="card-header" style="background-color: #3066BE; color: #ffffff;">Login</h5>
            <div class="card-body" style="background-color: #ffffff">
                <form action="../index.html" id="formulario">
                    <div class="mb-3">
                        <label for="nomeInput" class="form-label" style="color: #000000;">Nome</label>
                        <input type="text" class="form-control" id="nomeInput">
                        <div id="ajuda" class="form-text" style="color: #000000;">Não compartilhamos suas
                            informações com ninguém.</div>
                    </div>
                    <div class="mb-3">
                        <label for="emailInput" class="form-label" style="color: #000000;">Email</label>
                        <input type="email" class="form-control" id="emailInput">
                        <div id="ajuda" class="form-text" style="color: #000000;">Não compartilhamos suas
                            informações com ninguém.</div>
                    </div>
                    <div class="mb-3">
                        <label for="senhaInput" class="form-label" style="color: #000000;">Senha</label>
                        <input type="password" class="form-control" id="senhaInput">
                    </div>
                    <button type="submit" class="btn btn-primary" onclick="login()">Login</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="col-12">
        <p style="color: white; text-align: center; margin: 0; padding: 10px 0;">
            <a href="pages/saibaMais.html" class="nav-link text-white">Saiba mais</a>
            &copy; Direitos reservados ao Coblog.
        </p>
    </footer>

    <div class="overlay" id="overlay"></div>

    <script src="../scripts/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
