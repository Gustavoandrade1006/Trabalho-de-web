<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coblog - Acesse seu perfil!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="../css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/webp" href="imagens/bola-de-futebol.webp">
</head>

<body>

    <input type="checkbox" id="lua" hidden>
    <label for="lua" class="dark-mode-btn">🌙</label>

    <header class="header col-12">
        <h2>Coblog</h2>
        <nav id="nav" style="gap: 15px; padding-right: 10px;" class="d-flex justify-content-between">
            <a href="../index.html" class="nav-link text-white"><span class="menu-texto">Página
                    Inicial</span></a>
        </nav>
    </header>
    
    <sidebar id="sidebar">
        <input type="checkbox" id="menu-toggle" hidden>
        <label for="menu-toggle" class="hamburguer" style="color: rgb(0, 102, 255)">☰</label>

        <nav class="menu" style="color: white" ; id="menu-lateral">
            <h4 style="padding-top: 5px;" class="text-white menu-texto">Menu</h4>
            <a href="edicoesAnteriores.html" class="nav-link text-white" target="_parent">Edições
                da Copa</a>
            <a href="comunidade.html" class="nav-link text-white" target="_parent">Comunidade</a>
        </nav>
    </sidebar>

    <main class="container py-5">
        <div class="row">
            <!-- Avatar & Sobre mim -->
            <div class="col-md-4 text-center">
                <i class="bi bi-person-circle display-1 text-secondary"></i>
                <h4 class="mt-3" id="nomeUsuarioPerfil">Nome do Usuário</h4>

                <div class="card shadow-sm mt-4 text-start">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Sobre mim</h5>
                        <textarea class="form-control" rows="5" placeholder="Conte um pouco sobre você..."></textarea>
                    </div>
                </div>
            </div>

            <!-- Dados de Edição / Criar uma função que mostre a edição para apenas um dos blocos -->
            <div class="col-md-8">

                <div class="card shadow-sm">
                    <div class="card-body">

                        <h5 class="card-title mb-4">Configurações do Perfil</h5>

                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <p id="nomeAntigo"> Nome Antigo do Usuário </p>
                            <input type="text" class="form-control" placeholder="Digite um novo nome" id="nomeInput">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">E-mail</label>
                            <p id="emailAntigo"> E-mail Antigo do Usuário </p>
                            <input type="email" class="form-control" placeholder="Digite um novo nome" id="emailInput">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nova senha</label>
                            <p id="senhaAntigo"> Senha Antiga do Usuário </p>
                            <input type="password" class="form-control" placeholder="Digite uma nova senha"
                                id="senhaInput">
                        </div>

                        <div class="d-flex justify-content-end">
                            <button class="btn btn-primary" onclick="salvarAlteracoes()">
                                Salvar alterações
                            </button>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="col-12">
        <p style="color: white; text-align: center; margin: 0; padding: 10px 0;">
            <a href="pages/saibaMais.html" class="nav-link text-white">Saiba mais</a>
            &copy; Direitos reservados ao Coblog.
        </p>
    </footer>

    <div class="overlay" id="overlay"></div>

    <script src="../scripts/perfil.js"></script>
    <script src="../scripts/scripts.js"></script>
</body>

</html>
